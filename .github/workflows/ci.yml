name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, Test, Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: knowai_erp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowai_erp_test
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  frontend:
    name: Frontend — Lint, Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    name: E2E — Playwright API Tests
    runs-on: ubuntu-latest
    needs: [backend]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: knowai_erp_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/knowai_erp_test
      JWT_SECRET: ci-test-secret-do-not-use-in-production
      NODE_ENV: test
      CRON_SECRET: ci-cron-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed
          npm run build

      - name: Start backend
        working-directory: backend
        run: npx next start -p 3000 &
        env:
          PORT: 3000

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -s http://localhost:3000/api/health && break || sleep 1
          done

      - name: Install Playwright
        working-directory: frontend
        run: |
          npm ci --legacy-peer-deps
          npx playwright install chromium

      - name: Run API E2E tests
        working-directory: frontend
        run: npx playwright test e2e/api-health.spec.ts
        env:
          E2E_API_URL: http://localhost:3000
