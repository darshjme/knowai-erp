<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0066FF">
        <animate attributeName="stop-color" values="#0066FF;#003399;#0055DD;#0066FF" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#0044CC">
        <animate attributeName="stop-color" values="#0044CC;#0066FF;#003399;#0044CC" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#003399">
        <animate attributeName="stop-color" values="#003399;#0055DD;#0066FF;#003399" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="20%" stop-color="#30363d"/>
      <stop offset="80%" stop-color="#30363d"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#line)"/>
  <text x="600" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="url(#textGrad)" letter-spacing="-2">KnowAI</text>
  <text x="600" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" fill="#8b949e" letter-spacing="8" text-transform="uppercase">ENTERPRISE RESOURCE PLANNING</text>
</svg>